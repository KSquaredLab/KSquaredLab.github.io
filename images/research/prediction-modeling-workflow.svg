<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Prediction modeling workflow</title>
  <desc id="desc">A clean schematic showing biomedical data inputs, model training, validation plots, and risk prediction output.</desc>
  <defs>
    <linearGradient id="soft-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef7f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0b1f3a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="28" fill="url(#soft-bg)"/>
  <g opacity="0.45" stroke="#d9e3ea" stroke-width="1">
    <path d="M85 120H1115M85 220H1115M85 320H1115M85 420H1115M85 520H1115"/>
    <path d="M160 70V590M310 70V590M460 70V590M610 70V590M760 70V590M910 70V590M1060 70V590"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <text x="92" y="82" fill="#0b1f3a" font-size="31" font-weight="800">Prediction modeling</text>
    <text x="92" y="119" fill="#64748b" font-size="20">Biomedical data to validated risk estimates</text>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <g>
      <rect x="86" y="184" width="220" height="78" rx="18" fill="#ffffff" stroke="#d9e3ea" stroke-width="2"/>
      <circle cx="127" cy="223" r="18" fill="#0f766e"/>
      <path d="M119 223h16M127 215v16" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <text x="158" y="217" fill="#0b1f3a" font-size="22" font-weight="800">Clinical</text>
      <text x="158" y="243" fill="#64748b" font-size="15">outcomes</text>
    </g>

    <g>
      <rect x="86" y="292" width="220" height="78" rx="18" fill="#ffffff" stroke="#d9e3ea" stroke-width="2"/>
      <circle cx="127" cy="331" r="18" fill="#b7791f"/>
      <path d="M118 334c9-18 18-18 27 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <text x="158" y="326" fill="#0b1f3a" font-size="22" font-weight="800">Omics</text>
      <text x="158" y="352" fill="#64748b" font-size="15">high-dimensional</text>
    </g>

    <g>
      <rect x="86" y="400" width="220" height="78" rx="18" fill="#ffffff" stroke="#d9e3ea" stroke-width="2"/>
      <circle cx="127" cy="439" r="18" fill="#123c69"/>
      <path d="M118 439h18M127 430v18" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <text x="158" y="434" fill="#0b1f3a" font-size="22" font-weight="800">Imaging</text>
      <text x="158" y="460" fill="#64748b" font-size="15">phenotypes</text>
    </g>
  </g>

  <g fill="none" stroke="#8aa0b6" stroke-width="4" stroke-linecap="round">
    <path d="M306 223C370 223 386 274 430 304"/>
    <path d="M306 331H420"/>
    <path d="M306 439C370 439 386 386 430 356"/>
    <path d="M825 337H905"/>
    <path d="M900 337l-16-13M900 337l-16 13"/>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="430" y="196" width="395" height="318" rx="24" fill="#ffffff" stroke="#d9e3ea" stroke-width="2"/>
    <text x="468" y="250" fill="#0b1f3a" font-size="26" font-weight="850">Model development</text>
    <text x="468" y="284" fill="#64748b" font-size="17">training, validation, interpretation</text>

    <g transform="translate(475 326)">
      <rect x="0" y="0" width="118" height="130" rx="18" fill="#eef7f5" stroke="#b8d9d4" stroke-width="2"/>
      <path d="M59 20v30M28 72h62M28 72v32M90 72v32" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
      <circle cx="28" cy="110" r="10" fill="#0f766e"/>
      <circle cx="90" cy="110" r="10" fill="#0f766e"/>
      <text x="59" y="157" text-anchor="middle" fill="#0b1f3a" font-size="15" font-weight="800">tree models</text>
    </g>

    <g transform="translate(625 322)">
      <rect x="0" y="0" width="148" height="138" rx="18" fill="#f8fafc" stroke="#d9e3ea" stroke-width="2"/>
      <g stroke="#123c69" stroke-width="3" fill="#ffffff">
        <path d="M36 38L74 62L112 38M36 90L74 62L112 90"/>
        <circle cx="36" cy="38" r="11"/>
        <circle cx="112" cy="38" r="11"/>
        <circle cx="74" cy="62" r="11" fill="#123c69"/>
        <circle cx="36" cy="90" r="11"/>
        <circle cx="112" cy="90" r="11"/>
      </g>
      <text x="74" y="163" text-anchor="middle" fill="#0b1f3a" font-size="15" font-weight="800">AI models</text>
    </g>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="925" y="172" width="245" height="165" rx="22" fill="#ffffff" stroke="#d9e3ea" stroke-width="2"/>
    <text x="955" y="220" fill="#0b1f3a" font-size="23" font-weight="850">Validation</text>
    <path d="M965 288L1015 248L1058 262L1130 220" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M965 294H1132M965 244V294" stroke="#d9e3ea" stroke-width="3" stroke-linecap="round"/>
    <circle cx="1015" cy="248" r="8" fill="#0f766e"/>
    <circle cx="1058" cy="262" r="8" fill="#0f766e"/>
    <circle cx="1130" cy="220" r="8" fill="#0f766e"/>

    <rect x="925" y="374" width="245" height="165" rx="22" fill="#ffffff" stroke="#d9e3ea" stroke-width="2"/>
    <text x="955" y="423" fill="#0b1f3a" font-size="23" font-weight="850">Risk score</text>
    <path d="M978 496A74 74 0 0 1 1125 496" fill="none" stroke="#e2e8f0" stroke-width="18" stroke-linecap="round"/>
    <path d="M978 496A74 74 0 0 1 1088 438" fill="none" stroke="#b7791f" stroke-width="18" stroke-linecap="round"/>
    <circle cx="1088" cy="438" r="9" fill="#b7791f"/>
    <text x="1050" y="511" text-anchor="middle" fill="#64748b" font-size="15">calibrated output</text>
  </g>
</svg>
