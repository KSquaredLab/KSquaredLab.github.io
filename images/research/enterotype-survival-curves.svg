    <text x="105" y="563">0</text><text x="220" y="563">10</text><text x="333" y="563">20</text><text x="448" y="563">30</text><text x="520" y="563">50</text>
    <text x="676" y="563">0</text><text x="791" y="563">10</text><text x="904" y="563">20</text><text x="1019" y="563">30</text><text x="1091" y="563">50</text>
