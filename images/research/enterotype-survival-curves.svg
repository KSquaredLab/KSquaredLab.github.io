<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Kaplan-Meier survival curves by enterotype</title>
  <desc id="desc">Kaplan-Meier relapse-free survival curves adapted from a gut microbe-derived extracellular vesicle study.</desc>
  <rect width="1200" height="675" rx="26" fill="#ffffff"/>
